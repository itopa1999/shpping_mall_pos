<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Transaction Details</title>
    <style>
      .container {
        box-shadow: hsl(0, 0%, 80%) 0 0 5px;
        border-radius: 5px;
        width: 90vw;
        max-width: 600px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: white;
      }
      .bg-red {
        background: #b44f18;
        width: 100%;
        height: 10px;
        border-radius: 5px 5px 0 0;
      }
      .content {
        margin: 2em 1em;
        line-height: 2em;
      }
      .content p {
        font-family: Helvetica;
        font-weight: 300;
        font-size: 1.2rem;
      }
      .heavy {
        font-weight: 900;
        font-size: 1.25rem;
        letter-spacing: 1.5px;
      }
      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        background: #f4f4f4;
        border-radius: 5px;
      }
      th, td {
        padding: 10px;
        text-align: left;
        font-size: 1rem;
      }
      th {
        background-color: #e5e5e5;
        font-weight: bold;
      }
      td {
        border-bottom: 1px solid #ddd;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="bg-red"></div>
      <div class="content">
        <p>Hello, {{first_name}}</p>
        <p>Your transaction details are as follows:</p>
        <table>
          <tr>
            <th>Amount</th>
            <td>{{amount}}</td>
          </tr>
          <tr>
            <th>Description</th>
            <td>{{description}}</td>
          </tr>
          <tr>
            <th>Transaction Type</th>
            <td>{{type}}</td>
          </tr>
          <tr>
            <th>Date</th>
            <td>{{date}}</td>
          </tr>
        </table>
        <p>
          If you have any questions regarding this transaction, please contact support.<br /><br />
          
        </p>
      </div>
    </div>
  </body>
</html>
